{% load static %}
{% load whatsapp_tags %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ NOME_LOJA }}{% endblock %}</title>
    <meta name="description" content="Tapetes, laços e terços em crochê feitos à mão com capricho e exclusividade. Faça seu pedido pelo WhatsApp.">
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Poppins', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f7f5fc',
                            100: '#ede7f9',
                            200: '#dbd0f3',
                            300: '#c2aeea',
                            400: '#a785dd',
                            500: '#8c63ce',
                            600: '#7549b8',
                            700: '#603c97',
                            800: '#4d3179',
                            900: '#3f2a63',
                        },
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out both',
                        'ping-slow': 'pingSlow 2.5s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(16px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pingSlow: {
                            '0%': { transform: 'scale(1)', opacity: 0.6 },
                            '75%, 100%': { transform: 'scale(1.4)', opacity: 0 },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; max-width: 100vw; }
        h1, h2, h3, h4, .font-display { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #d4884f; border-radius: 999px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-brand-50 text-brand-900 antialiased">

{% include 'loja/partials/navbar.html' %}

<main>
    {% block content %}{% endblock %}
</main>

{% include 'loja/partials/footer.html' %}

<a
    href="{% whatsapp_link_geral request %}"
    target="_blank"
    rel="noopener"
    class="fixed bottom-5 right-5 z-40 flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold pl-3 pr-4 py-3 rounded-full shadow-lg shadow-green-500/30 transition-all hover:scale-105"
    aria-label="Falar no WhatsApp"
>
    <span class="relative inline-flex items-center justify-center w-8 h-8 shrink-0">
        <span class="absolute inset-0 rounded-full bg-green-400 animate-ping-slow pointer-events-none"></span>
        <span class="relative inline-flex items-center justify-center w-8 h-8 rounded-full bg-white/20">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 fill-current">
                <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm5.78 14.17c-.24.68-1.4 1.32-1.93 1.4-.5.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.64-.6-2.88-1.24-4.76-4.14-4.9-4.33-.14-.19-1.17-1.56-1.17-2.98 0-1.42.74-2.11 1.01-2.4.26-.29.57-.36.76-.36.19 0 .38 0 .54.01.18.01.41-.07.64.49.24.58.81 2.01.88 2.16.07.15.12.32.02.51-.1.19-.15.31-.29.48-.15.17-.31.38-.44.51-.15.15-.3.31-.13.6.17.29.76 1.25 1.63 2.02 1.12 1 2.06 1.31 2.35 1.46.29.15.46.13.63-.07.17-.2.73-.85.93-1.14.2-.29.39-.24.66-.14.27.1 1.71.81 2 .96.29.15.49.22.56.34.07.13.07.71-.17 1.39z"/>
            </svg>
        </span>
    </span>
    <span class="hidden sm:inline">Pedir no WhatsApp</span>
</a>

</body>
</html>
