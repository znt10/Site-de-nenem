{% load static %}
{% load whatsapp_tags %}
<header x-data="{ open: false }" class="sticky top-0 z-50 bg-brand-50/80 backdrop-blur-md border-b border-brand-200/60 shadow-sm shadow-brand-900/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 gap-4">
            <a href="{% url 'loja:home' %}" class="group flex items-center gap-2.5 font-display font-extrabold text-lg text-brand-700 shrink-0 whitespace-nowrap">
                <img src="{% static 'img/logo.png' %}" alt="{{ NOME_LOJA }}" class="w-11 h-11 object-contain transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-6">
                <span class="hidden sm:inline leading-tight">{{ NOME_LOJA }}</span>
            </a>

            <form action="{% url 'loja:produto_lista' %}" method="get" class="hidden md:flex flex-1 max-w-md">
                <div class="relative w-full">
                    <input
                        type="text" name="q" placeholder="Buscar produtos..."
                        value="{{ request.GET.q|default:'' }}"
                        class="w-full rounded-full border border-brand-200 bg-white py-2 pl-4 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-brand-400 transition"
                    >
                    <button type="submit" class="absolute right-1 top-1/2 -translate-y-1/2 p-1.5 text-brand-500 hover:text-brand-700 transition" aria-label="Buscar">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
            </form>

            <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="{% url 'loja:home' %}" class="relative py-1 transition hover:text-brand-600 after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:bg-brand-500 after:transition-all after:content-['']
                    {% if request.resolver_match.url_name == 'home' %}text-brand-700 after:w-full{% else %}after:w-0 hover:after:w-full{% endif %}">Início</a>
                <a href="{% url 'loja:produto_lista' %}" class="relative py-1 transition hover:text-brand-600 after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:bg-brand-500 after:transition-all after:content-['']
                    {% if request.resolver_match.url_name == 'produto_lista' or request.resolver_match.url_name == 'produto_detalhe' %}text-brand-700 after:w-full{% else %}after:w-0 hover:after:w-full{% endif %}">Produtos</a>
                {% if request.user.is_staff %}
                    <a href="{% url 'painel:categoria_lista' %}" class="relative py-1 transition hover:text-brand-600 after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:bg-brand-500 after:transition-all after:content-['']
                        {% if 'painel' in request.resolver_match.namespace %}text-brand-700 after:w-full{% else %}after:w-0 hover:after:w-full{% endif %}">Painel</a>
                {% endif %}
                <a href="{% whatsapp_link_geral request %}" target="_blank" rel="noopener" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-full shadow-sm hover:shadow-md transition-all hover:-translate-y-0.5">Fale Comigo</a>
            </nav>

            <button @click="open = !open" class="md:hidden relative w-10 h-10 rounded-lg hover:bg-brand-100 transition" aria-label="Abrir menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 m-auto w-6 h-6 transition-all duration-200" :class="open ? 'opacity-0 rotate-90 scale-50' : 'opacity-100 rotate-0 scale-100'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 m-auto w-6 h-6 transition-all duration-200" :class="open ? 'opacity-100 rotate-0 scale-100' : 'opacity-0 -rotate-90 scale-50'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div x-show="open" x-cloak x-transition.duration.200ms class="md:hidden pb-4 space-y-3 border-t border-brand-200/60 pt-3">
            <form action="{% url 'loja:produto_lista' %}" method="get">
                <div class="relative">
                    <input
                        type="text" name="q" placeholder="Buscar produtos..."
                        value="{{ request.GET.q|default:'' }}"
                        class="w-full rounded-full border border-brand-200 bg-white py-2 pl-4 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                    >
                    <button type="submit" class="absolute right-1 top-1/2 -translate-y-1/2 p-1.5 text-brand-500 hover:text-brand-700 transition" aria-label="Buscar">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
            </form>
            <div class="flex flex-col gap-1 text-sm font-medium">
                <a href="{% url 'loja:home' %}" class="px-3 py-2 rounded-lg transition {% if request.resolver_match.url_name == 'home' %}bg-brand-100 text-brand-700{% else %}hover:bg-brand-100{% endif %}">Início</a>
                <a href="{% url 'loja:produto_lista' %}" class="px-3 py-2 rounded-lg transition {% if request.resolver_match.url_name == 'produto_lista' or request.resolver_match.url_name == 'produto_detalhe' %}bg-brand-100 text-brand-700{% else %}hover:bg-brand-100{% endif %}">Produtos</a>
                {% if request.user.is_staff %}
                    <a href="{% url 'painel:categoria_lista' %}" class="px-3 py-2 rounded-lg transition {% if 'painel' in request.resolver_match.namespace %}bg-brand-100 text-brand-700{% else %}hover:bg-brand-100{% endif %}">Painel</a>
                {% endif %}
                <a href="{% whatsapp_link_geral request %}" target="_blank" rel="noopener" class="px-3 py-2 rounded-full bg-brand-500 hover:bg-brand-600 text-white text-center shadow-sm transition">Fale Comigo</a>
            </div>
        </div>
    </div>
</header>
