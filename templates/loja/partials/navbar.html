{% load whatsapp_tags %}
<header x-data="{ open: false }" class="sticky top-0 z-50 bg-brand-50/80 backdrop-blur-md border-b border-brand-200/60">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 gap-4">
            <a href="{% url 'loja:home' %}" class="flex items-center gap-2 font-display font-extrabold text-xl text-brand-700 shrink-0">
                <span class="inline-flex items-center justify-center w-9 h-9 rounded-xl bg-brand-500 text-white shadow-sm">🧺</span>
                {{ NOME_LOJA }}
            </a>

            <form action="{% url 'loja:produto_lista' %}" method="get" class="hidden md:flex flex-1 max-w-md">
                <div class="relative w-full">
                    <input
                        type="text" name="q" placeholder="Buscar produtos..."
                        value="{{ request.GET.q|default:'' }}"
                        class="w-full rounded-full border border-brand-200 bg-white py-2 pl-4 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 transition"
                    >
                    <button type="submit" class="absolute right-1 top-1/2 -translate-y-1/2 p-1.5 text-brand-500 hover:text-brand-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
            </form>

            <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="{% url 'loja:home' %}" class="hover:text-brand-600 transition">Início</a>
                <a href="{% url 'loja:produto_lista' %}" class="hover:text-brand-600 transition">Produtos</a>
                {% if request.user.is_staff %}
                    <a href="{% url 'painel:dashboard' %}" class="hover:text-brand-600 transition">Painel</a>
                {% endif %}
                <a href="{% whatsapp_link_geral request %}" target="_blank" rel="noopener" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-full shadow-sm transition">Fale Comigo</a>
            </nav>

            <button @click="open = !open" class="md:hidden p-2 rounded-lg hover:bg-brand-100 transition" aria-label="Abrir menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    <path x-show="open" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div x-show="open" x-cloak x-transition class="md:hidden pb-4 space-y-3">
            <form action="{% url 'loja:produto_lista' %}" method="get">
                <input
                    type="text" name="q" placeholder="Buscar produtos..."
                    value="{{ request.GET.q|default:'' }}"
                    class="w-full rounded-full border border-brand-200 bg-white py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                >
            </form>
            <div class="flex flex-col gap-1 text-sm font-medium">
                <a href="{% url 'loja:home' %}" class="px-3 py-2 rounded-lg text-center hover:bg-brand-100 transition">Início</a>
                <a href="{% url 'loja:produto_lista' %}" class="px-3 py-2 rounded-lg text-center hover:bg-brand-100 transition">Produtos</a>
                {% if request.user.is_staff %}
                    <a href="{% url 'painel:dashboard' %}" class="px-3 py-2 rounded-lg text-center hover:bg-brand-100 transition">Painel</a>
                {% endif %}
                <a href="{% whatsapp_link_geral request %}" target="_blank" rel="noopener" class="px-3 py-2 rounded-lg bg-brand-500 text-white text-center">Fale Comigo</a>
            </div>
        </div>
    </div>
</header>
