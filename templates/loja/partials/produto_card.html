{% load whatsapp_tags %}
<article class="group bg-white rounded-2xl shadow-sm hover:shadow-xl border border-brand-100 overflow-hidden transition-all duration-300 hover:-translate-y-1 animate-fade-in-up">
    <a href="{{ produto.get_absolute_url }}" class="block aspect-square overflow-hidden bg-brand-100 relative">
        {% if produto.imagem_principal %}
            <img src="{{ produto.imagem_principal.url }}" alt="{{ produto.nome }}"
                 class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy">
        {% else %}
            <div class="w-full h-full flex items-center justify-center text-5xl text-brand-300">🧺</div>
        {% endif %}
        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur text-brand-700 text-xs font-semibold px-3 py-1 rounded-full shadow-sm">
            {{ produto.categoria.nome }}
        </span>
    </a>
    <div class="p-4 flex flex-col gap-2">
        <h3 class="font-display font-semibold text-base line-clamp-1">
            <a href="{{ produto.get_absolute_url }}" class="hover:text-brand-600 transition">{{ produto.nome }}</a>
        </h3>
        <p class="text-brand-500 text-sm line-clamp-2 min-h-[2.5rem]">{{ produto.descricao }}</p>
        <div class="flex items-center justify-between mt-1">
            <span class="font-display font-bold text-lg text-brand-700">R$ {{ produto.preco|stringformat:".2f" }}</span>
        </div>
        <a
            href="{% whatsapp_link_produto produto request %}"
            target="_blank" rel="noopener"
            class="mt-2 inline-flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition shadow-sm"
        >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-4 h-4 fill-current">
                <path d="M16.001 3C9.373 3 4 8.373 4 15c0 2.39.7 4.61 1.91 6.48L4 29l7.73-1.86A11.93 11.93 0 0 0 16.001 27C22.629 27 28 21.627 28 15S22.629 3 16.001 3zm0 21.6c-1.93 0-3.74-.5-5.32-1.38l-.38-.22-4.59 1.1 1.13-4.47-.25-.4A9.56 9.56 0 0 1 5.4 15c0-5.85 4.76-10.6 10.6-10.6S26.6 9.15 26.6 15 21.85 24.6 16.001 24.6zm5.84-7.93c-.32-.16-1.9-.94-2.2-1.04-.3-.11-.51-.16-.73.16-.21.32-.83 1.04-1.02 1.25-.19.21-.37.24-.69.08-.32-.16-1.34-.49-2.55-1.57-.94-.84-1.58-1.87-1.76-2.19-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.73-1.76-1-2.41-.26-.63-.53-.54-.73-.55-.19-.01-.4-.01-.62-.01-.21 0-.56.08-.85.4-.29.32-1.12 1.1-1.12 2.67 0 1.57 1.15 3.09 1.31 3.3.16.21 2.26 3.45 5.47 4.84.76.33 1.36.52 1.82.67.77.24 1.46.21 2.01.13.61-.09 1.9-.78 2.17-1.53.27-.75.27-1.39.19-1.53-.08-.13-.29-.21-.61-.37z"/>
            </svg>
            Pedir no WhatsApp
        </a>
    </div>
</article>
